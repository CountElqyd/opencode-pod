# opencode-pod.toml — generated by opencode-pod init
# Edit this file to customize your container.

[container]
# Optional: override the auto-generated container name
# name = "my-custom-name"
# Base image (Wolfi glibc)
image = "cgr.dev/chainguard/wolfi-base:latest"
# System packages to install via apk on first launch
packages = ["git", "openssh", "curl"]
# Container user (created on first launch)
user = "dev"

[mounts]
# Extra bind mounts. Format: "host_path:container_path[:ro]"
# Host paths support ~ expansion.
# WARNING: [env] values are visible inside the container at /workspace.
# For secrets (API keys, tokens), use podman secrets instead:
#   printf "sk-xxx" | podman secret create my-key -
extra = []

[env]
# Environment variables passed to the container.
# Visible to the container via `env` and opencode-pod.toml.
# Do NOT put API keys or tokens here — use podman secrets.
# FOO = "bar"

[network]
# Network mode: "bridge" (default — internet access) or "none" (no network)
mode = "bridge"
# Ports to forward from host to container
forward = []

[security]
# HTTPS-only (blocks HTTP requests at opencode permission level)
http = false
# Enable podman security hardening (seccomp, no-new-privileges)
harden = true
