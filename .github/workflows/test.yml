name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck -qq
      - name: Run shellcheck
        run: shellcheck opencode-pod install.sh lib/*.sh profiles/ralph/*.sh
      - name: Build and verify profile tarballs
        run: |
          for profile in profiles/*/; do
            if [ -f "${profile}build.sh" ]; then
              bash "${profile}build.sh"
            fi
          done
          for tarball in profiles/*/*.tar.gz; do
            tar tzf "$tarball" >/dev/null || {
              echo "Error: $tarball is invalid"
              exit 1
            }
          done

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run bats tests
        run: bats bats/
