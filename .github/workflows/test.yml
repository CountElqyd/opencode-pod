name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run shellcheck
        run: npx shellcheck opencode-pod install.sh lib/*.sh profiles/ralph/*.sh
      - name: Verify profile tarballs are fresh
        run: |
          for profile in profiles/*/; do
            if [ -f "${profile}build.sh" ]; then
              bash "${profile}build.sh"
            fi
          done
          git diff --exit-code --stat || {
            echo "Error: profile tarballs are stale — run build.sh and commit the updated tarballs"
            exit 1
          }

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run bats tests
        run: bats bats/
